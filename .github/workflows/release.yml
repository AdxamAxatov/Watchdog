name: Auto Release on Push

# A push to main that touches shipped code builds all five executables and
# publishes them as a patch-bumped GitHub Release. Deployed apps poll
# releases/latest and self-update — so commit -> live machines update.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/release.yml"

# The release job needs to create tags/releases with the built-in token.
permissions:
  contents: write

# Serialize releases: never run two at once, and never cancel one that is
# already publishing (a cancelled release could leave a half-uploaded tag).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout (full history for changelog + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executables (onefile console)
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --noconfirm --clean --onefile --name Watchdog        src/watchdog.py
          pyinstaller --noconfirm --clean --onefile --name Boot            src/boot_main.py
          pyinstaller --noconfirm --clean --onefile --name WindowChecker   src/window_checker_main.py
          pyinstaller --noconfirm --clean --onefile --name DropStats       src/drop_stats_main.py
          pyinstaller --noconfirm --clean --onefile --name MemReductLooped src/memreduct_looped.py
          ls -la dist/

      - name: Compute tag, write notes, and publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # --- compute next tag from the latest existing release -----------
          latest_tag="$(gh release view --json tagName -q .tagName 2>/dev/null || echo "")"
          if [ -z "$latest_tag" ]; then
            new_tag="v1.0.0"
            prev_tag=""
            echo "No existing release found — starting at $new_tag"
          else
            echo "Latest release tag: $latest_tag"
            if [[ ! "$latest_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Latest tag '$latest_tag' is not vMAJOR.MINOR.PATCH — refusing to guess a bump"
              exit 1
            fi
            ver="${latest_tag#v}"
            major="${ver%%.*}"
            rest="${ver#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
            new_tag="v${major}.${minor}.$((patch + 1))"
            prev_tag="$latest_tag"
            echo "Next tag: $new_tag"
          fi

          # --- refuse to clobber an existing tag/release -------------------
          git fetch --tags --quiet || true
          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null; then
            echo "::error::Tag ${new_tag} already exists — aborting"
            exit 1
          fi
          if gh release view "${new_tag}" >/dev/null 2>&1; then
            echo "::error::Release ${new_tag} already exists — aborting"
            exit 1
          fi

          # --- build release notes -----------------------------------------
          # ONE checksum line per asset in the per-asset format:
          #   SHA256 (Watchdog.exe): <hash>
          # The "(" after SHA256 deliberately breaks the OLD deployed regex
          # `SHA256:\s*([a-fA-F0-9]{64})` so pre-existing exes skip
          # verification instead of failing it. New exes parse the named form.
          assets=(Watchdog Boot WindowChecker DropStats MemReductLooped)
          notes_file="$(mktemp)"
          {
            echo "Automated release built from commit ${GITHUB_SHA}."
            echo ""
            echo "## Checksums"
            for a in "${assets[@]}"; do
              exe="dist/${a}.exe"
              if [ ! -f "$exe" ]; then
                echo "::error::Missing build artifact ${exe}" >&2
                exit 1
              fi
              h="$(sha256sum "$exe" | cut -d' ' -f1)"
              echo "SHA256 (${a}.exe): ${h}"
            done
            echo ""
            echo "## Changes"
            if [ -n "$prev_tag" ]; then
              git log --no-merges --pretty='- %h %s' "${prev_tag}..HEAD" || true
            else
              git log --no-merges --pretty='- %h %s' -n 20 || true
            fi
          } > "$notes_file"

          echo "----- release notes -----"
          cat "$notes_file"
          echo "-------------------------"

          # --- publish -----------------------------------------------------
          # Basenames become the asset names, so they match the deployed
          # updaters' executable_name contract exactly (Watchdog.exe, ...).
          gh release create "${new_tag}" \
            --title "${new_tag}" \
            --notes-file "$notes_file" \
            --target "${GITHUB_SHA}" \
            dist/Watchdog.exe \
            dist/Boot.exe \
            dist/WindowChecker.exe \
            dist/DropStats.exe \
            dist/MemReductLooped.exe
