  user1_point_pct:
    x: 0.1902
    y: 0.2754
  user2_point_pct:
    x: 0.2366
    y: 0.3300
  ui_wait_s: 5.0
  dialog_wait_s: 1.0    

rdp_windows:
  # Size for each RDP game window (SixFarmers15, SixFarmers16)
  width: 1616   # Width in pixels
  height: 939  # Height in pixels
  # Window search term
  title_search: "SinFermera"
  focus_interval_minutes: 30

  # --- Black-screen / hung RDP recovery (added) ---
  # Every tick the focuser samples each SinFermera window's client area.
  # A window is treated as BLACK when its mean pixel brightness (0-255) stays
  # below `blackness_threshold` for `blackness_consecutive` samples in a row,
  # OR when is_window_responding() reports it hung.
  blackness_threshold: 12        # mean brightness below this = "black"
  blackness_consecutive: 2       # consecutive black samples required to act
  reopen_wait_seconds: 12        # wait after closing before re-enumerating

  # Owner's literal ask: "otherwise just close the windows every 30 min".
  # When true, a healthy tick still closes each session window (RDP client
  # auto-reopens it). Set false to only close BLACK/HUNG windows.
  unconditional_cycle: true

