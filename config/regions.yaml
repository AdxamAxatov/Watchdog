paths:
  memreduct_exe:
    - "C:/Program Files/Mem Reduct/MemReduct.exe"

  rdpclient_exe:
    - "C:/Users/Farmer7/Downloads/RDPClient/RDPClient/RDPClient.exe"

  # FreeRDP renderer that RDPClient actually spawns to draw each session.
  # When a session window goes black, this is the process that's stuck/dead.
  # The black-screen recovery uses this to decide whether the host RDP stack
  # is still alive (so it can just close+reopen the window) or fully dead
  # (so it must relaunch RDPClient). Only the BASENAME (wfreerdp.exe) is used
  # for the running-process check; the full path is informational / future use.
  # NOTE: verify this path matches the actual install on each PC.
  wfreerdp_exe:
    - "C:/Users/Farmer7/Downloads/RDPClient/RDPClient/wfreerdp.exe"

rdp:
  user1_point_pct:
    x: 0.1902
    y: 0.2754
  user2_point_pct:
    x: 0.2366
    y: 0.3300
  ui_wait_s: 5.0
  dialog_wait_s: 1.0

  # --- Stuck-session reconnect (WindowChecker) ---
  # Disconnect button inside RDP Session Manager (% of its client area).
  disconnect_point_pct:
    x: 0.4476
    y: 0.1262
  # Map each session entry above to the window title it opens. When a window
  # does NOT reopen after a close, WindowChecker clicks that entry -> Disconnect
  # -> entry again to force a reconnect. LEAVE BLANK to disable targeted
  # reconnect (then only host-dead relaunch runs). Fill per-PC.
  user1_title: ""   # e.g. "SinFermera23" — title user1_point_pct opens
  user2_title: ""   # e.g. "SinFermera24" — title user2_point_pct opens

rdp_windows:
  # Size for each RDP game window (SixFarmers15, SixFarmers16)
  width: 1616   # Width in pixels
  height: 939  # Height in pixels
  # Window search term
  title_search: "SinFermera"
  focus_interval_minutes: 30

  # --- Reconnect cycle ---
  # Every cycle WindowChecker disconnects+reconnects each session via the RDP
  # Session Manager (rdp.user1_title/user2_title + disconnect_point_pct must be
  # set). A renderer whose window survives its disconnect is FROZEN and gets
  # force-killed, then reconnected.
  reopen_wait_seconds: 15        # wait after the reconnects before re-enumerating

# Drop-stats automation (DropStatsRunner.exe). All four are PLACEHOLDERS —
# calibrate manually per-PC. Same percentage-of-client-area convention as
# button_point_pct / kill_all_cs2_point_pct above.
