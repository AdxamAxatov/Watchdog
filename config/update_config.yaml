# config/update_config.yaml
# Auto-updater configuration (FIXED VERSION)

# Enable/disable auto-updates
enabled: true

# GitHub repository info (FIXED: Matching your actual repo)
repo_owner: "AdxamAxatov"      # ✅ Fixed from "s1gmamale1"
repo_name: "Watchdog"           # ✅ Fixed from "watchdog"

# Current version (update this when you release new versions)
current_version: "1.0.0"

# Executable name (FIXED: Capital W)
executable_name: "Watchdog.exe" # ✅ Fixed from "watchdog.exe"

# Check interval (hours)
check_interval_hours: 1

# Auto-restart settings
auto_restart: false
restart_window:
  start_hour: 3
  end_hour: 5

# Silent mode (less logging)
silent_mode: false

# Backup old version before update
backup_old_version: true

# Timeouts
github_api_timeout: 10
download_timeout: 60

